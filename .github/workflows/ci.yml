name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Run tests
        run: pytest -v

      - name: Smoke-test the pipeline script
        run: ./scripts/run_pipeline.sh

      - name: Build the Docker image
        run: docker build -t test-harness .

      - name: Run the CLI inside the image
        run: docker run --rm test-harness --input sample_logs/
